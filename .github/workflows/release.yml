name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v, e.g. 0.3.0-rc1)'
        required: true
        default: '0.0.0-dev'

jobs:
  build-macos:
    runs-on: macos-14
    env:
      APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
      APPLE_DEVELOPER_ID_CERT_PASSWORD:   ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
      APPLE_ID:                           ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD:        ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID:                      ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install create-dmg
        run: npm install -g create-dmg

      - name: Resolve FOGHORN_VERSION
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            echo "FOGHORN_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "FOGHORN_VERSION=$DISPATCH_VERSION" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: foghorn-macos-dmg
          path: build/bin/foghorn-*-universal.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            patchelf \
            desktop-file-utils \
            zsync

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache linuxdeploy
        uses: actions/cache@v4
        with:
          path: build/.cache
          key: linuxdeploy-1-alpha-20240109-1

      - name: Resolve FOGHORN_VERSION
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            echo "FOGHORN_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "FOGHORN_VERSION=$DISPATCH_VERSION" >> "$GITHUB_ENV"
          fi

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: foghorn-linux-appimage
          path: build/bin/foghorn-*-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/foghorn-*-universal.dmg
            artifacts/foghorn-*-x86_64.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
