sources:
  - name: local-alertmanager
    type: alertmanager
    url: http://localhost:9093
    auth:
      type: basic
      username: ${FOGHORN_AM_USER}
      password: ${FOGHORN_AM_PASS}
    poll_interval: 30s

display:
  visible_labels:
    - alertname
    - severity
    - label:cluster:raw
    - label:namespace:raw
  visible_annotations:
    - annotation:summary
  subtitle_annotations:
    - annotation:description
    - annotation:summary
  # group_by, sort_by, visible_labels, visible_annotations, and
  # subtitle_annotations field reference syntax:
  #   field:<name>       built-in alert field
  #   label:<name>       alert label value
  #   annotation:<name>  alert annotation value
  #
  # Optional suffixes:
  #   :both      show raw plus resolved value when available (default)
  #   :raw       always show the original value
  #   :resolved  prefer the resolved value, fall back to original
  #
  # Supported built-in field:* values:
  #   field:severity   critical < warning < info < unknown
  #   field:startsAt   alert start time
  #   field:updatedAt  last update time
  #   field:source     source name
  #   field:name       alert name
  #   field:state      firing < silenced < inhibited < resolved
  #
  # Bare strings still work for labels in group_by, for example:
  #   - cluster
  # is equivalent to:
  #   - label:cluster
  group_by:
    - field:source
    - label:cluster:both
  # Controls how group_by_overrides keys are matched:
  #   display  match the rendered top-level group label (default)
  #   raw      match the underlying raw values for the top-level group fields
  group_by_override_key_mode: display
  # Optional per-group refinement. The key is the top-level group key produced by
  # group_by. Matching groups append the listed fields, while all other groups
  # keep the default group_by as-is. Keys use the mode above.
  #
  # Example with display mode:
  # group_by_overrides:
  #   local-alertmanager/saas-cs-0b:
  #     - label:namespace
  #
  # Example with raw mode and `group_by: [label:cluster:both]`:
  # group_by_override_key_mode: raw
  # group_by_overrides:
  #   saas-cs-0b:
  #     - label:namespace
  sort_by:
    - field: field:severity
      order: asc
    - field: annotation:description
      order: asc
    - field: field:startsAt
      order: desc

sounds:
  enabled: false

notifications:
  enabled: true
  on_new: true
  on_resolved: false
  batch_threshold: 5

actions: []

resolvers:
  # Optional local-only value resolvers. These run after alerts are fetched and
  # only affect display/grouping/sorting/filtering in the UI. Raw labels remain
  # untouched for silences, actions, and provider requests.
  #
  # Each resolver targets one field reference and executes a local command.
  # The command should print the resolved value to stdout.
  #
  # Available templates in command/args/env:
  #   {{.Value}}               raw value for the configured field
  #   {{.Ref}}                 full field ref, e.g. label:cluster
  #   {{.Kind}}                field | label | annotation
  #   {{.Name}}                field/label/annotation name
  #   {{.Alert.Source}}        alert source
  #   {{.Labels.cluster}}      alert label access
  #   {{.Annotations.summary}} alert annotation access
  #
  # Example: map internal cluster IDs to customer-facing names using a local script.
  # - name: cluster-name
  #   field: label:cluster
  #   command: ./scripts/resolve-cluster
  #   args:
  #     - "{{.Value}}"
  #   timeout: 500ms
  #   cache_ttl: 24h

ui:
  theme: system
  popup_width: 800
  popup_height: 600
  show_resolved: false
  show_silenced: true
  default_created_by: ${USER}
